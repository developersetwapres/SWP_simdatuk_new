# Docker Compose for running the Next.js standalone production image
# Environment variables are defined here (per requirement)
version: "3.8"

services:
  swp_simdatuknew_app:
    build:
      context: .
      dockerfile: Dockerfile
    image: swp_simdatuknew:latest
    container_name: swp_simdatuknew
    # Do not set secrets or env in the image; set them here instead
    environment:
      # Example environment variable for the frontend to access the Laravel API
      NEXT_PUBLIC_API_URL: "http://10.1.53.220:8008/api"
      # Ensure production mode inside the container
      NODE_ENV: "production"
    restart: unless-stopped
    # The container runs as non-root because the image user is switched in Dockerfile
    # If you need to pass additional env variables, add them here (do not hardcode in source)

# Notes:
# - The Next.js app expects `NEXT_PUBLIC_API_URL` (example above). Do not hardcode URLs
#   in the source code; use `process.env.NEXT_PUBLIC_API_URL` in the frontend.
